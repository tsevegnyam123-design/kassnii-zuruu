<!DOCTYPE html>
<html>
<head>
  <title>Ажилтны систем</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    :root {
      --bg: #f4f6f9;
      --text: #000;
      --card: #fff;
    }

    .dark {
      --bg: #121212;
      --text: #fff;
      --card: #1e1e1e;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
    }

    .small-btn {
      background: gray;
      font-size: 14px;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Нэвтрэх</h2>

  <input type="text" id="empId" placeholder="ID">
  
  <input type="password" id="empPass" placeholder="Нууц үг" id="pass">
  <button class="small-btn" onclick="togglePass()">👁 Show Password</button>

  <label>
    <input type="checkbox" id="remember"> Намайг сана
  </label>

  <button onclick="login()">Нэвтрэх</button>

  <p id="msg"></p>

  <div id="userPanel" style="display:none;">
    <hr>
    <p id="result"></p>
    <button onclick="logout()">🔄 Logout</button>
  </div>

  <button class="small-btn" onclick="toggleDark()">🌙 Dark mode</button>

</div>

<script>
let data = [];
let api = "https://opensheet.elk.sh/1eQ4HH3qhpMLda1mdt76iffTw2hjt0aifH-o9wGpTfQs/final";

// Load data
fetch(api)
  .then(res => res.json())
  .then(json => data = json);

// Show password
function togglePass(){
  let pass = document.getElementById("empPass");
  pass.type = pass.type === "password" ? "text" : "password";
}

// Login
function login(){
  let id = document.getElementById("empId").value;
  let pass = document.getElementById("empPass").value;

  let emp = data.find(e => e.ID == id && e.password == pass);

  if(emp){
    document.getElementById("msg").innerText = "";

    document.getElementById("userPanel").style.display = "block";

    document.getElementById("result").innerText =
  `👤 ${emp["Нэр"]} (${emp["ID"]})\n💰 ₮${emp["Зөрүү дүн"]} MN340004000410156863 TDB TSEVEGNYAM`;

    // Remember me
    if(document.getElementById("remember").checked){
      localStorage.setItem("user", JSON.stringify(emp));
    }

  } else {
    document.getElementById("msg").innerText = "❌ Буруу мэдээлэл";
  }
}

// Auto login
window.onload = () => {
  let saved = localStorage.getItem("user");
  if(saved){
    let emp = JSON.parse(saved);
    document.getElementById("userPanel").style.display = "block";
    document.getElementById("result").innerText =
      `👤 ${emp["Нэр"]} (${emp["ID"]})\n💰 ₮${emp["Зөрүү дүн"]}`;
  }
}

// Logout
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// Dark mode
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
